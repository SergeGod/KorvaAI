  <rect x="418" y="158" width="120" height="8" rx="2" fill="#ef4444" fill-opacity="0.55"/>
  <rect x="418" y="174" width="200" height="5" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="418" y="186" width="180" height="5" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="418" y="198" width="140" height="5" rx="2" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="418" y="216" width="90" height="20" rx="3" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="524" y="216" width="90" height="20" rx="3" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Trend line panel -->
  <rect x="400" y="265" width="340" height="125" rx="4" fill="#09131a" stroke="#0ea5e9" stroke-opacity="0.1" stroke-width="1"/>
  <rect x="418" y="280" width="80" height="7" rx="2" fill="#ffffff" fill-opacity="0.25"/>
  <polyline points="418,360 445,340 475,355 510,320 545,310 580,290 615,305 650,275 700,285 730,260" stroke="#0ea5e9" stroke-opacity="0.8" stroke-width="2" fill="none"/>
  <polygon points="418,370 445,340 475,355 510,320 545,310 580,290 615,305 650,275 700,285 730,260 730,370" fill="#0ea5e9" fill-opacity="0.05"/>

  <!-- Slack-style report card -->
  <rect x="60" y="408" width="680" height="130" rx="4" fill="#09131a" stroke="#0ea5e9" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Slack icon approximation -->
  <rect x="76" y="424" width="4" height="18" rx="2" fill="#0ea5e9" fill-opacity="0.7"/>
  <rect x="84" y="424" width="280" height="8" rx="2" fill="#0ea5e9" fill-opacity="0.5"/>
  <rect x="84" y="438" width="220" height="5" rx="2" fill="#ffffff" fill-opacity="0.25"/>
  <rect x="84" y="450" width="250" height="5" rx="2" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="84" y="462" width="190" height="5" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="84" y="476" width="80" height="6" rx="2" fill="#0ea5e9" fill-opacity="0.35"/>

  <!-- Metrics inline -->
  <rect x="420" y="430" width="100" height="40" rx="3" fill="#0c1c28" stroke="#0ea5e9" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="432" y="440" width="60" height="6" rx="2" fill="#0ea5e9" fill-opacity="0.6"/>
  <rect x="432" y="452" width="40" height="5" rx="2" fill="#22c55e" fill-opacity="0.5"/>

  <rect x="534" y="430" width="100" height="40" rx="3" fill="#0c1c28" stroke="#0ea5e9" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="546" y="440" width="60" height="6" rx="2" fill="#f59e0b" fill-opacity="0.6"/>
  <rect x="546" y="452" width="40" height="5" rx="2" fill="#f59e0b" fill-opacity="0.4"/>

  <rect x="648" y="430" width="72" height="40" rx="3" fill="#0c1c28" stroke="#0ea5e9" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="660" y="440" width="40" height="6" rx="2" fill="#ef4444" fill-opacity="0.6"/>
  <rect x="660" y="452" width="30" height="5" rx="2" fill="#ef4444" fill-opacity="0.4"/>

  <!-- Timestamp -->
  <rect x="84" y="498" width="100" height="5" rx="2" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Accent line -->
  <rect x="0" y="598" width="800" height="2" fill="url(#accent4)"/>
  <text x="400" y="570" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.18" letter-spacing="3">FLOWINTEL · AI ANALYTICS AGENT</text>
</svg>
