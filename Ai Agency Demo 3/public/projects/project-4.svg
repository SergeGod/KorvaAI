    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="133" y1="0" x2="133" y2="600"/>
    <line x1="266" y1="0" x2="266" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="533" y1="0" x2="533" y2="600"/>
    <line x1="666" y1="0" x2="666" y2="600"/>
  </g>

  <!-- Header panel -->
  <rect x="60" y="60" width="680" height="60" rx="4" fill="#0a141c" stroke="#0ea5e9" stroke-opacity="0.1" stroke-width="1"/>
  <rect x="80" y="78" width="120" height="12" rx="2" fill="#0ea5e9" fill-opacity="0.5"/>
  <rect x="80" y="96" width="80" height="6" rx="2" fill="#ffffff" fill-opacity="0.18"/>
  <!-- Status dot -->
  <circle cx="650" cy="82" r="5" fill="#22c55e" fill-opacity="0.8"/>
  <rect x="662" y="78" width="60" height="8" rx="2" fill="#22c55e" fill-opacity="0.45"/>
  <rect x="662" y="92" width="40" height="5" rx="2" fill="#ffffff" fill-opacity="0.2"/>

  <!-- KPI bar chart -->
  <rect x="60" y="140" width="320" height="250" rx="4" fill="#09131a" stroke="#0ea5e9" stroke-opacity="0.1" stroke-width="1"/>
  <rect x="78" y="158" width="100" height="8" rx="2" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="78" y="172" width="60" height="5" rx="2" fill="#0ea5e9" fill-opacity="0.5"/>

  <!-- Bars -->
  <rect x="90"  y="280" width="28" height="90" rx="2" fill="url(#chartBar)"/>
  <rect x="130" y="255" width="28" height="115" rx="2" fill="url(#chartBar)"/>
  <rect x="170" y="235" width="28" height="135" rx="2" fill="url(#chartBar)"/>
  <rect x="210" y="270" width="28" height="100" rx="2" fill="url(#chartBar2)"/>
  <rect x="250" y="220" width="28" height="150" rx="2" fill="url(#chartBar)"/>
  <rect x="290" y="245" width="28" height="125" rx="2" fill="url(#chartBar2)"/>
  <rect x="330" y="200" width="28" height="170" rx="2" fill="url(#chartBar)"/>

  <!-- Grid lines inside chart -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
