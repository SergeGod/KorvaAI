<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070d12"/>
      <stop offset="100%" style="stop-color:#040a0e"/>
    </linearGradient>
    <radialGradient id="glow4" cx="60%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="chartBar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="chartBar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg4)"/>
  <rect width="800" height="600" fill="url(#glow4)"/>

  <!-- Grid -->
  <g stroke="#0ea5e9" stroke-opacity="0.035" stroke-width="1">
