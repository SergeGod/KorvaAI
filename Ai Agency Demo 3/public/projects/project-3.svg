<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a080f"/>
      <stop offset="100%" style="stop-color:#060409"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#120e1e"/>
      <stop offset="100%" style="stop-color:#080510"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg3)"/>
  <rect width="800" height="600" fill="url(#glow3)"/>

  <!-- Browser chrome -->
  <rect x="60" y="60" width="680" height="480" rx="8" fill="#0c0a12" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Browser top bar -->
  <rect x="60" y="60" width="680" height="36" rx="8" fill="#100d18"/>
  <rect x="60" y="84" width="680" height="12" fill="#100d18"/>
  <!-- Traffic lights -->
  <circle cx="88" cy="78" r="5" fill="#ff5f57" fill-opacity="0.7"/>
  <circle cx="106" cy="78" r="5" fill="#ffbd2e" fill-opacity="0.7"/>
  <circle cx="124" cy="78" r="5" fill="#28c840" fill-opacity="0.7"/>
  <!-- URL bar -->
  <rect x="200" y="68" width="400" height="20" rx="4" fill="#080610" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <rect x="215" y="76" width="160" height="5" rx="2" fill="#8b5cf6" fill-opacity="0.4"/>

  <!-- Website hero section inside browser -->
  <rect x="60" y="96" width="680" height="200" fill="url(#heroBg)"/>

  <!-- Nav bar inside site -->
  <rect x="60" y="96" width="680" height="36" fill="#0d0b16"/>
  <rect x="80" y="108" width="70" height="10" rx="2" fill="#8b5cf6" fill-opacity="0.6"/>
  <rect x="480" y="110" width="50" height="6" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="542" y="110" width="50" height="6" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="604" y="106" width="68" height="16" rx="3" fill="#8b5cf6" fill-opacity="0.35" stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Hero headline -->
  <rect x="180" y="158" width="280" height="22" rx="3" fill="#ffffff" fill-opacity="0.6"/>
  <rect x="180" y="188" width="220" height="22" rx="3" fill="#ffffff" fill-opacity="0.4"/>
  <rect x="180" y="216" width="160" height="14" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="180" y="244" width="110" height="32" rx="4" fill="#8b5cf6" fill-opacity="0.5"/>

  <!-- Abstract 3D shape on right -->
  <ellipse cx="580" cy="196" rx="80" ry="80" fill="none" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="1.5"/>
  <ellipse cx="580" cy="196" rx="55" ry="55" fill="#8b5cf6" fill-opacity="0.04"/>
  <ellipse cx="580" cy="196" rx="55" ry="22" fill="none" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1" transform="rotate(-15 580 196)"/>
  <ellipse cx="580" cy="196" rx="35" ry="35" fill="none" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Services section inside browser -->
  <rect x="60" y="296" width="680" height="130" fill="#090710"/>
  <rect x="80" y="312" width="80" height="8" rx="2" fill="#ffffff" fill-opacity="0.35"/>
  <!-- Service cards -->
  <rect x="80" y="332" width="190" height="76" rx="4" fill="#100d18" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="96" y="348" width="80" height="8" rx="2" fill="#8b5cf6" fill-opacity="0.5"/>
  <rect x="96" y="364" width="120" height="5" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="96" y="376" width="100" height="5" rx="2" fill="#ffffff" fill-opacity="0.15"/>

  <rect x="290" y="332" width="190" height="76" rx="4" fill="#100d18" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="306" y="348" width="100" height="8" rx="2" fill="#ffffff" fill-opacity="0.35"/>
  <rect x="306" y="364" width="130" height="5" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="306" y="376" width="110" height="5" rx="2" fill="#ffffff" fill-opacity="0.1"/>

  <rect x="500" y="332" width="220" height="76" rx="4" fill="#100d18" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="516" y="348" width="120" height="8" rx="2" fill="#ffffff" fill-opacity="0.35"/>
  <rect x="516" y="364" width="140" height="5" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="516" y="376" width="100" height="5" rx="2" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Footer inside browser -->
  <rect x="60" y="426" width="680" height="114" fill="#07050e"/>
  <rect x="80" y="450" width="80" height="8" rx="2" fill="#8b5cf6" fill-opacity="0.5"/>
  <rect x="80" y="466" width="160" height="5" rx="2" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="80" y="478" width="130" height="5" rx="2" fill="#ffffff" fill-opacity="0.1"/>
  <rect x="600" y="450" width="120" height="8" rx="2" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="600" y="466" width="100" height="5" rx="2" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Accent line -->
  <rect x="0" y="598" width="800" height="2" fill="url(#accent3)"/>
  <text x="400" y="570" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.18" letter-spacing="3">ORBITA STUDIO · BRAND &amp; WEB</text>
</svg>
